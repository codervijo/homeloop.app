<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Homeloom — The OS for homeschool families</title>
    <meta name="description" content="Homeloom helps homeschool families file compliance, plan daily school, and generate transcripts — all in one calm system." />
    <meta name="author" content="Homeloom" />

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      gtag('config', '%VITE_GA_ID%');

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="canonical" href="https://homeloom.app/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <meta property="og:title" content="Homeloom — The OS for homeschool families" />
    <meta property="og:description" content="Compliance, daily planning, and transcripts — all in one place." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://homeloom.app/" />
    <meta property="og:image" content="https://homeloom.app/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@homeloomapp" />
    <meta name="twitter:image" content="https://homeloom.app/og-image.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://homeloom.app/#organization",
            "name": "Homeloom",
            "url": "https://homeloom.app/",
            "logo": "https://homeloom.app/favicon.svg"
          },
          {
            "@type": "WebSite",
            "@id": "https://homeloom.app/#website",
            "url": "https://homeloom.app/",
            "name": "Homeloom",
            "description": "The operating system for homeschool families.",
            "publisher": { "@id": "https://homeloom.app/#organization" },
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://homeloom.app/?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "WebApplication",
            "name": "Homeloom",
            "url": "https://homeloom.app/",
            "applicationCategory": "EducationApplication",
            "operatingSystem": "Web",
            "description": "Homeloom helps homeschool families file compliance, plan daily school, and generate transcripts — all in one calm system.",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
            "publisher": { "@id": "https://homeloom.app/#organization" }
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "What is Homeloom?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Homeloom is a web app for homeschool families to track daily tasks, file state compliance paperwork, and generate official transcripts."
                }
              },
              {
                "@type": "Question",
                "name": "Is Homeloom free to use?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. The core homeschool dashboard, compliance drafting, and transcript generator are free."
                }
              },
              {
                "@type": "Question",
                "name": "Does Homeloom file my California PSA for me?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Homeloom generates a draft Private School Affidavit (PSA) PDF you can keep for your records. Final filing is done on the official California Department of Education site."
                }
              },
              {
                "@type": "Question",
                "name": "Can I export an official-looking transcript?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. Homeloom's transcript generator builds a clean PDF transcript with subjects, hours, credits, and GPA from the work you've tracked."
                }
              }
            ]
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
